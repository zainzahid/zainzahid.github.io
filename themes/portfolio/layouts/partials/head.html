<style>
  /*--------------------------------------------------------------
# General
--------------------------------------------------------------*/
  @font-face {
    font-family: "Space Grotesk";
    src: url("{{ "assets/SpaceGrotesk.ttf" | relURL }}") format("truetype");
  }
  body {
    font-family: "Space Grotesk", sans-serif;
    color: #444444;
    background-color: #f8f9fa;
  }

  h1,
  h2,
  h3,
  h4,
  h5,
  h6 {
    font-family: "Space Grotesk", sans-serif;
  }

  a {
    color: #12d640;
    text-decoration: none;
  }

  a:hover {
    color: #0faa33;
    text-decoration: none;
  }

  /*--------------------------------------------------------------
# Header
--------------------------------------------------------------*/
  .header-tops {
    background: #0e1624;
    padding: 80px 0;
    text-align: center;
    color: #fff;
  }

  .header-tops h1 {
    font-size: 48px;
    font-weight: 700;
  }

  .header-tops h1 a {
    color: #fff;
  }

  .header-tops h2 {
    font-size: 24px;
    margin-top: 10px;
  }

  .nav-menu {
    margin-top: 30px;
  }

  .nav-menu ul {
    display: flex;
    margin: 0;
    padding: 0;
    list-style: none;
    justify-content: center;
  }

  .nav-menu li {
    margin: 0 15px;
  }

  .nav-menu a {
    color: rgba(255, 255, 255, 0.7);
    font-size: 18px;
    display: block;
    font-weight: 600;
    transition: 0.3s;
  }

  .nav-menu a:hover,
  .nav-menu .active > a {
    color: #fff;
  }

  .social-links {
    margin-top: 30px;
  }

  .social-links a {
    font-size: 24px;
    display: inline-block;
    background: rgba(255, 255, 255, 0.1);
    color: #fff;
    line-height: 1;
    padding: 8px 0;
    margin-right: 4px;
    border-radius: 50%;
    text-align: center;
    width: 40px;
    height: 40px;
    transition: 0.3s;
  }

  .social-links a:hover {
    background: #12d640;
    color: #fff;
  }

  /*--------------------------------------------------------------
# Sections General
--------------------------------------------------------------*/
  section {
    padding: 60px 0;
    overflow: hidden;
  }

  .section-title {
    text-align: center;
    padding-bottom: 30px;
  }

  .section-title h2 {
    font-size: 32px;
    font-weight: bold;
    margin-bottom: 20px;
    padding-bottom: 20px;
    position: relative;
  }

  .section-title h2::after {
    content: "";
    position: absolute;
    display: block;
    width: 50px;
    height: 3px;
    background: #12d640;
    bottom: 0;
    left: calc(50% - 25px);
  }

  .section-title p {
    margin-bottom: 0;
  }

  /*--------------------------------------------------------------
# About
--------------------------------------------------------------*/
  .about {
    background: #fff;
  }

  .about .content h3 {
    font-weight: 700;
    font-size: 26px;
    color: #173b6c;
  }

  .about .content p {
    margin-bottom: 20px;
  }

  .about .content .icon-box {
    margin-top: 20px;
  }

  .about .content .icon-box h4 {
    font-size: 18px;
    color: #0e1624;
    font-weight: 600;
    margin-bottom: 5px;
  }

  /*--------------------------------------------------------------
# Resume
--------------------------------------------------------------*/
  .resume {
    background: #f9f9f9;
  }

  .resume .resume-title {
    font-size: 24px;
    font-weight: 700;
    margin-top: 20px;
    margin-bottom: 20px;
    color: #173b6c;
  }

  .resume .resume-item {
    padding: 0 0 20px 20px;
    margin-top: -2px;
    border-left: 2px solid #12d640;
    position: relative;
  }

  .resume .resume-item h4 {
    line-height: 18px;
    font-size: 18px;
    font-weight: 600;
    color: #0e1624;
    margin-bottom: 10px;
  }

  .resume .resume-item h5 {
    font-size: 16px;
    background: #e4edf9;
    padding: 5px 15px;
    display: inline-block;
    font-weight: 600;
    margin-bottom: 10px;
  }

  .resume .resume-item ul {
    padding-left: 20px;
  }

  .resume .resume-item ul li {
    padding-bottom: 10px;
  }

  .resume .resume-item:last-child {
    padding-bottom: 0;
  }

  .resume .resume-item::before {
    content: "";
    position: absolute;
    width: 16px;
    height: 16px;
    border-radius: 50px;
    left: -9px;
    top: 0;
    background: #fff;
    border: 2px solid #12d640;
  }

  /*--------------------------------------------------------------
# Skills
--------------------------------------------------------------*/
  .skills {
    background: #fff;
  }

  .skills .skill-item {
    padding: 10px 15px;
    margin-bottom: 15px;
    background: #f8f9fa;
    border-radius: 5px;
    display: inline-block;
    font-weight: 600;
    color: #0e1624;
    font-size: 14px;
  }

  .skill-group {
    margin-bottom: 20px;
  }

  .skill-group h3 {
    font-size: 20px;
    color: #173b6c;
    margin-bottom: 15px;
  }

  #awards {
    background: #fff;
  }

  /*--------------------------------------------------------------
# Projects
--------------------------------------------------------------*/
  .projects {
    background: #f9f9f9;
  }

  .projects-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 28px;
  }

  .project-card {
    background: #fff;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(14, 22, 36, 0.08);
    cursor: pointer;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    outline: none;
  }

  .project-card:hover,
  .project-card:focus-visible {
    transform: translateY(-6px);
    box-shadow: 0 12px 40px rgba(14, 22, 36, 0.15);
  }

  .project-card:focus-visible {
    box-shadow: 0 12px 40px rgba(14, 22, 36, 0.15), 0 0 0 3px rgba(18, 214, 64, 0.4);
  }

  .project-card-image {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 220px;
    padding: 4px;
    overflow: hidden;
    background: #eef0f3;
  }

  .project-card-image.is-portrait {
    height: 320px;
    padding: 16px;
    background: #0e1624;
  }

  .project-card-image.is-landscape img,
  .project-card-image:not(.is-portrait) img {
    width: 100%;
    height: 100%;
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    object-position: center;
  }

  .project-card-image.is-portrait img {
    max-width: 100%;
    max-height: 100%;
    width: auto;
    height: auto;
    object-fit: contain;
    object-position: center;
  }

  .project-card:hover .project-card-image img,
  .project-card:focus-visible .project-card-image img {
    transform: none;
  }

  .project-card-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to top,
      rgba(14, 22, 36, 0.85) 0%,
      rgba(14, 22, 36, 0.2) 50%,
      transparent 100%
    );
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding-bottom: 20px;
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .project-card:hover .project-card-overlay,
  .project-card:focus-visible .project-card-overlay {
    opacity: 1;
  }

  .project-card-cta {
    color: #fff;
    font-weight: 600;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    background: rgba(18, 214, 64, 0.9);
    border-radius: 24px;
  }

  .project-card-body {
    padding: 22px 24px 26px;
  }

  .project-card-body h3 {
    font-size: 20px;
    font-weight: 700;
    color: #0e1624;
    margin-bottom: 10px;
  }

  .project-card-body p {
    font-size: 14px;
    color: #666;
    line-height: 1.6;
    margin-bottom: 16px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .project-card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .project-tag {
    font-size: 12px;
    font-weight: 600;
    color: #0e1624;
    background: #f0fdf4;
    border: 1px solid rgba(18, 214, 64, 0.3);
    padding: 4px 10px;
    border-radius: 20px;
  }

  .project-modal .modal-content {
    border: none;
    border-radius: 16px;
    overflow: hidden;
  }

  .project-modal .modal-header {
    border-bottom: 1px solid #eee;
    padding: 20px 28px;
  }

  .project-modal .modal-title {
    font-size: 24px;
    font-weight: 700;
    color: #0e1624;
  }

  .project-modal .modal-body {
    padding: 0 28px 28px;
  }

  .project-modal-layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 32px;
    padding-top: 8px;
  }

  .project-modal-gallery .project-gallery {
    position: relative;
    border-radius: 12px;
    overflow: hidden;
    background: #eef0f3;
  }

  .project-modal-gallery .project-gallery:has(.is-portrait) {
    background: #0e1624;
  }

  .project-gallery-viewport {
    position: relative;
    min-height: 280px;
  }

  .project-gallery-slide {
    display: none;
    align-items: center;
    justify-content: center;
    min-height: 280px;
    padding: 8px;
    background: #eef0f3;
  }

  .project-gallery-slide.active {
    display: flex;
  }

  .project-gallery-slide.is-portrait {
    min-height: 420px;
    padding: 20px;
    background: #0e1624;
  }

  .project-gallery-slide.is-landscape img,
  .project-gallery-slide:not(.is-portrait) img {
    display: block;
    width: 100%;
    height: auto;
    max-height: 58vh;
    object-fit: contain;
    object-position: center;
  }

  .project-gallery-slide.is-portrait img {
    display: block;
    width: auto;
    height: auto;
    max-width: 100%;
    max-height: 72vh;
    object-fit: contain;
    object-position: center;
  }

  .project-gallery-nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 44px;
    height: 44px;
    border: none;
    border-radius: 50%;
    background: rgba(14, 22, 36, 0.82);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    cursor: pointer;
    z-index: 2;
    transition: background 0.2s, transform 0.2s;
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
  }

  .project-gallery-nav:hover {
    background: #12d640;
    transform: translateY(-50%) scale(1.05);
  }

  .project-gallery-prev {
    left: 12px;
  }

  .project-gallery-next {
    right: 12px;
  }

  .project-modal-thumbs {
    display: flex;
    gap: 10px;
    margin-top: 12px;
    flex-wrap: wrap;
    align-items: flex-end;
  }

  .project-modal-thumb {
    width: 80px;
    height: 52px;
    border-radius: 8px;
    overflow: hidden;
    cursor: pointer;
    border: 2px solid transparent;
    opacity: 0.6;
    transition: opacity 0.2s, border-color 0.2s;
    padding: 2px;
    background: #eef0f3;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .project-modal-thumb.is-portrait {
    width: 52px;
    height: 80px;
    padding: 4px;
    background: #0e1624;
  }

  .project-modal-thumb.is-landscape img,
  .project-modal-thumb:not(.is-portrait) img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    object-position: center;
  }

  .project-modal-thumb.is-portrait img {
    max-width: 100%;
    max-height: 100%;
    width: auto;
    height: auto;
    object-fit: contain;
    object-position: center;
  }

  .project-modal-thumb.active,
  .project-modal-thumb:hover {
    opacity: 1;
    border-color: #12d640;
  }

  .project-modal-description {
    font-size: 15px;
    color: #555;
    line-height: 1.7;
    margin-bottom: 16px;
  }

  .project-modal-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 20px;
  }

  .project-modal-details h4 {
    font-size: 16px;
    font-weight: 700;
    color: #173b6c;
    margin-bottom: 12px;
  }

  .project-modal-highlights {
    padding-left: 20px;
    margin-bottom: 20px;
  }

  .project-modal-highlights li {
    font-size: 14px;
    color: #555;
    line-height: 1.6;
    padding-bottom: 8px;
  }

  .project-modal-link {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-weight: 600;
    font-size: 14px;
    color: #fff;
    background: #12d640;
    padding: 10px 20px;
    border-radius: 8px;
    transition: background 0.2s;
  }

  .project-modal-link:hover {
    background: #0faa33;
    color: #fff;
  }

  @media (max-width: 991px) {
    .project-modal-layout {
      grid-template-columns: 1fr;
    }

    .projects-grid {
      grid-template-columns: 1fr;
    }
  }

  /*--------------------------------------------------------------
# Contact
--------------------------------------------------------------*/
  .contact {
    background: #f9f9f9;
  }

  .contact .info {
    padding: 30px;
    background: #fff;
    width: 100%;
    box-shadow: 0 0 24px 0 rgba(0, 0, 0, 0.1);
  }

  .contact .info i {
    font-size: 20px;
    color: #12d640;
    float: left;
    width: 44px;
    height: 44px;
    background: #f3f7f9;
    display: flex;
    justify-content: center;
    align-items: center;
    border-radius: 50px;
    transition: all 0.3s ease-in-out;
  }

  .contact .info h4 {
    padding: 0 0 0 60px;
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 5px;
    color: #0e1624;
  }

  .contact .info p {
    padding: 0 0 0 60px;
    margin-bottom: 0;
    font-size: 14px;
    color: #444444;
  }

  .contact .info .email:hover i,
  .contact .info .address:hover i,
  .contact .info .phone:hover i {
    background: #12d640;
    color: #fff;
  }

  /*--------------------------------------------------------------
# Footer
--------------------------------------------------------------*/
  #footer {
    background: #0e1624;
    color: #fff;
    font-size: 14px;
    text-align: center;
    padding: 30px 0;
  }

  #footer h3 {
    font-size: 36px;
    font-weight: 700;
    color: #fff;
    position: relative;
    padding: 0;
    margin: 0 0 15px 0;
  }

  #footer p {
    font-size: 15px;
    padding: 0;
    margin: 0 0 40px 0;
  }

  #footer .social-links {
    margin: 0 0 40px 0;
  }

  #footer .copyright {
    margin: 0 0 5px 0;
  }
</style>
